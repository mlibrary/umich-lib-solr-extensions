name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          # Solr 9 requires Java 17; CI uses Java 21 (Solr 10 default)
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        # Targeting Solr 9 — the only HathiTrust index using Solr 10 (ptsearch) does not use custom JARs
        run: mvn clean package -Dsolr.version=9.7.0 -Dlucene.version=9.11.1 -Djava.version=17 -DskipTests

      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: target/umich-solr-extensions.jar
