name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          # Solr 9 requires Java 17; CI uses Java 21 (Solr 10 default)
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        # Targeting Solr 9 — the only HathiTrust index using Solr 10 (ptsearch) does not use custom JARs
        run: mvn clean package -Dsolr.version=9.7.0 -Dlucene.version=9.11.1 -Djava.version=17 -DskipTests

      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: target/umich-solr-extensions-*.jar
