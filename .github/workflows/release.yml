name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Deploy to GitHub Packages and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create GitHub release + push snapshot bump commit
      packages: write        # publish to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can push the post-release snapshot bump
          fetch-depth: 0

      # Configure Java + inject GitHub Packages credentials into ~/.m2/settings.xml
      - name: Set up Java 21 (Temurin) with GitHub Packages auth
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Extract release version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          VERSION="${TAG#v}"                # strip leading 'v'
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Compute next snapshot: bump patch segment
          MAJOR="$(echo "${VERSION}" | cut -d. -f1)"
          MINOR="$(echo "${VERSION}" | cut -d. -f2)"
          PATCH="$(echo "${VERSION}" | cut -d. -f3)"
          NEXT_SNAPSHOT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          echo "next_snapshot=${NEXT_SNAPSHOT}" >> "$GITHUB_OUTPUT"

      - name: Set release version in POMs
        run: mvn --batch-mode versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Build, test, and deploy to GitHub Packages
        run: mvn --batch-mode deploy -P release
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push the snapshot version bump back to main so the working branch
      # stays on a SNAPSHOT and the release commit is clearly labeled.
      - name: Bump to next snapshot version
        run: |
          mvn --batch-mode versions:set -DnewVersion=${{ steps.version.outputs.next_snapshot }} -DgenerateBackupPoms=false
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump to ${{ steps.version.outputs.next_snapshot }} [skip ci]"
          git push origin HEAD:main
